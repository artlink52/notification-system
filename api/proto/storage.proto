syntax = "proto3";

package storage;

option go_package = "github.com/artlink52/notification-system/pkg/pb/storage;storage";

import "notification.proto";

service StorageService {
  rpc SaveNotification(SaveNotificationRequest) returns (SaveNotificationResponse);
  rpc GetNotification(GetNotificationRequest)   returns (GetNotificationResponse);
}

message SaveNotificationRequest {
  int64                        user_id = 1;
  string                       message = 2;
  notification.NotificationType type   = 3;
  notification.NotificationStatus status = 4;
}

message SaveNotificationResponse {
  int64 id = 1;
}

message GetNotificationRequest {
  int64 id = 1;
}

message GetNotificationResponse {
  int64                           id          = 1;
  int64                           user_id     = 2;
  string                          message     = 3;
  notification.NotificationType   type        = 4;
  notification.NotificationStatus status      = 5;
  string                          created_at  = 6;
  int32                           retry_count = 7;
}